<h1>{{ name }}</h1>

<dl>
  <td>Nombre:</td>
  <dd>{{ name }}</dd>

  <td>Edad:</td>
  <dd>{{ age }}</dd>

  <td>Metodo:</td>
  <dd>{{ getHeroDescription() }}</dd>

  <td>Capitalizado:</td>
  <dd>{{ capitalizedName }}</dd>
</dl>
<button
  *ngIf="name != 'SPIDERMAN'"
  (click)="changeHero()"
  type="button"
  class="btn btn-dark mx-2"
>
  Cambiar Nombre
</button>
<button
  *ngIf="age !== 18"
  (click)="changeAge()"
  type="button"
  class="btn btn-light mx-2"
>
  Cambiar Edad
</button>
<button (click)="restauredHero()" type="button" class="btn btn-primary">
  Restaurar Heroe
</button>
